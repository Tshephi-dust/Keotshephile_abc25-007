<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback | Dust Threads</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>Dust Threads Store</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="feedback.html">Feedback</a>
    <a href="gallery.html">Gallery</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
  </nav>
</header>

<section class="content">
  <h2>Customer Feedback</h2>

  <form class="feedback-form" onsubmit="submitFeedback(event)">
    <input type="text" id="name" placeholder="Your Name" required>

    <input type="email" id="email" placeholder="Your Email" required>

    <textarea id="message" placeholder="Write your message..." rows="5" required></textarea>

    <button type="submit" class="submit-btn">Submit Feedback</button>
  </form>

  <p id="successMessage" style="color: green; display: none;">
    ✅ Thank you! Your feedback has been submitted.
  </p>

</section>

<footer>
  <p>&copy; 2024 Dust Threads Store</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
