<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      background: #d62828;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    .order-summary {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .btn {
      background: #f77f00;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      margin-top: 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    .success {
      text-align: center;
      padding: 20px;
      background: green;
      margin-top: 20px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Checkout</h1>
</header>

<div class="container">

  <!-- Customer Details -->
  <h2>Customer Details</h2>

  <input type="text" id="name" placeholder="Full Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <input type="text" id="address" placeholder="Delivery Address" required>

  <!-- Delivery -->
  <h2>Delivery Area</h2>
  <select id="location" onchange="updateTotal()">
    <option value="0">Select Area</option>
    <option value="20">Nearby (P20)</option>
    <option value="35">Mid Distance (P35)</option>
    <option value="50">Far (P50)</option>
  </select>

  <!-- Order Summary -->
  <div class="order-summary">
    <h2>Order Summary</h2>
    <div id="orderItems"></div>

    <p>Items Total: P<span id="itemsTotal">0</span></p>
    <p>Delivery Fee: P<span id="deliveryFee">0</span></p>
    <h3>Total: P<span id="totalPrice">0</span></h3>
  </div>

  <!-- Confirm Button -->
  <button class="btn" onclick="placeOrder()">Confirm Order</button>

  <!-- Success Message -->
  <div class="success" id="successMessage">
    <h2>✅ Order Placed Successfully!</h2>
    <p>Your food is on the way 🚚🔥</p>
  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Display order summary
function displayOrder() {
  let container = document.getElementById("orderItems");
  let total = 0;

  container.innerHTML = "";

  cart.forEach(item => {
    total += item.price;
    container.innerHTML += `<p>${item.name} - P${item.price}</p>`;
  });

  document.getElementById("itemsTotal").innerText = total;
  updateTotal();
}

// Update total
function updateTotal() {
  let itemsTotal = 0;

  cart.forEach(item => itemsTotal += item.price);

  let delivery = parseInt(document.getElementById("location").value);

  document.getElementById("deliveryFee").innerText = delivery;
  document.getElementById("totalPrice").innerText = itemsTotal + delivery;
}

// Place order
function placeOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let location = document.getElementById("location").value;

  if (!name || !phone || !address || location == "0") {
    alert("Please fill in all details!");
    return;
  }

  // Clear cart
  localStorage.removeItem("cart");

  // Show success message
  document.getElementById("successMessage").style.display = "block";
}

// Load page
displayOrder();
</script>

</body>
</html>
