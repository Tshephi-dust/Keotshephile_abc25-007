<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dust Menu</title>

  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: #d62828;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #222;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    .section {
      padding: 20px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      height: 150px;
      object-fit: cover;
    }

    .btn {
      background: #f77f00;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 100%;
    }

    select {
      margin-top: 10px;
      padding: 5px;
      width: 100%;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Dust Pedros Menu</h1>
  <p>Choose Your Heat. Taste the Flame.</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="cart.html">Cart</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- Combos Section -->
<section class="section">
  <h2>🔥 Combo Meals</h2>

  <div class="items">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <h3>Quarter Chicken + Chips</h3>
      <p>P65</p>

      <select id="spice1">
        <option>Mild</option>
        <option>Hot</option>
        <option>Extra Hot</option>
      </select>

      <button class="btn" onclick="addCombo('Quarter Chicken + Chips', 65, 'spice1')">
        Add to Cart
      </button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964092-4316c288032e">
      <h3>Chicken Burger + Chips</h3>
      <p>P70</p>

      <select id="spice2">
        <option>Mild</option>
        <option>Hot</option>
        <option>Extra Hot</option>
      </select>

      <button class="btn" onclick="addCombo('Chicken Burger + Chips', 70, 'spice2')">
        Add to Cart
      </button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5">
      <h3>Half Chicken + Chips</h3>
      <p>P95</p>

      <select id="spice3">
        <option>Mild</option>
        <option>Hot</option>
        <option>Extra Hot</option>
      </select>

      <button class="btn" onclick="addCombo('Half Chicken + Chips', 95, 'spice3')">
        Add to Cart
      </button>
    </div>

  </div>
</section>

<!-- Extras -->
<section class="section">
  <h2>🍟 Extras</h2>

  <div class="items">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585238342028-4d5f9c9d4b42">
      <h3>Regular Chips</h3>
      <p>P30</p>
      <button class="btn" onclick="addToCart('Regular Chips', 30)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
      <h3>Chicken Wrap</h3>
      <p>P55</p>

      <select id="spice4">
        <option>Mild</option>
        <option>Hot</option>
        <option>Extra Hot</option>
      </select>

      <button class="btn" onclick="addCombo('Chicken Wrap', 55, 'spice4')">
        Add to Cart
      </button>
    </div>

  </div>
</section>

<script>
function addCombo(name, price, spiceId) {
  let spice = document.getElementById(spiceId).value;
  addToCart(name + " (" + spice + ")", price);
}
</script>

<script src="js/script.js"></script>

</body>
</html>
