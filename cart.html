<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>

  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      background: #d62828;
      padding: 15px;
      text-align: center;
    }

    .cart-container {
      padding: 20px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c1c1c;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .btn {
      background: #f77f00;
      border: none;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .remove-btn {
      background: crimson;
    }

    .total {
      font-size: 20px;
      margin-top: 20px;
      text-align: right;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Your Cart</h1>
</header>

<div class="cart-container">
  <label for="location">Select Delivery Area:</label>
  <select id="location" onchange="updateTotal()">
    <option value="0">-- Choose Area --</option>
    <option value="20">Nearby (P20)</option>
    <option value="35">Mid Distance (P35)</option>
    <option value="50">Far (P50)</option>
  </select>
</div>

<div class="cart-container total">
  <p>Items Total: P<span id="itemsTotal">0</span></p>
  <p>Delivery Fee: P<span id="deliveryFee">0</span></p>
  <h3>Grand Total: P<span id="totalPrice">0</span></h3>
</div>

<script src="js/script.js"></script>

</body>
</html>
