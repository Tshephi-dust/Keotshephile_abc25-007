<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KFC Order System</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* Simple fallback styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff;
    }

    header {
      background-color: #e4002b;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background-color: black;
      display: flex;
      justify-content: center;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background-color: #e4002b;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center/cover;
      height: 300px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      background-color: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .section {
      padding: 20px;
      text-align: center;
    }

    .items {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 200px;
      padding: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      background-color: #e4002b;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: black;
    }

    footer {
      background-color: black;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>KFC Order System</h1>
    <p>Delicious meals delivered fast 🍗</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Order Your Favourite KFC Meals Now</h1>
  </div>

  <!-- Popular Items -->
  <div class="section">
    <h2>Popular Meals</h2>

    <div class="items">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086" alt="Burger">
        <h3>Zinger Burger</h3>
        <p>P45</p>
        <button class="btn">Add to Cart</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1562967916-eb82221dfb92" alt="Chicken">
        <h3>Fried Chicken</h3>
        <p>P60</p>
        <button class="btn">Add to Cart</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1585238342028-4d5f9c9d4b42" alt="Fries">
        <h3>Fries</h3>
        <p>P25</p>
        <button class="btn">Add to Cart</button>
      </div>
    </div>
  </div>

  <!-- Deals Section -->
  <div class="section">
    <h2>Special Deals</h2>
    <p>Get combo meals at discounted prices!</p>
    <button class="btn">View Deals</button>
  </div>

</body>
</html>
