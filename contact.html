<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Dust Order System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .contact-container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      text-align: center;
    }

    .contact-container h2 {
      margin-bottom: 20px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .contact-form textarea {
      resize: none;
      height: 120px;
    }

    .contact-info {
      margin-top: 30px;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 10px;
    }

    .success-message {
      color: green;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>

<body>

<!-- Header -->
<header>
  <h1>Contact Us 📞</h1>
  <p>We’d love to hear from you!</p>
</header>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="cart.html">Cart</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- Contact Section -->
<section class="contact-container">

  <h2>Send Us a Message</h2>

  <form class="contact-form" onsubmit="sendMessage(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" placeholder="Your Message" required></textarea>
    
    <button class="btn">Send Message</button>
  </form>

  <p class="success-message" id="successMsg">✅ Message sent successfully!</p>

  <!-- Contact Info -->
  <div class="contact-info">
    <p><strong>Email:</strong> support@kfcordersystem.com</p>
    <p><strong>Phone:</strong> +267 123 4567</p>
    <p><strong>Location:</strong> Gaborone, Botswana</p>
  </div>

</section>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Dust Order System</p>
</footer>

<!-- JavaScript -->
<script src="js/script.js"></script>

<script>
  function sendMessage(event) {
    event.preventDefault();

    // Simulate sending
    document.getElementById("successMsg").style.display = "block";

    // Clear form
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
  }
</script>

</body>
</html>
