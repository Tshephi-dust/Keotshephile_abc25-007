<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <h1 class="logo">Dust Threads</h1>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="shop.html">Shop</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="feedback.html">Feedback</a>
    <a href="reviews.html">Reviews</a>
    <a href="cart.html">Cart 🛒</a>
  </nav>
</header>

<section class="content">
  <h2>Contact Us</h2>
  <p class="subtitle">We’d love to hear from you</p>

  <!-- CONTACT INFO -->
  <div class="contact-info">
    <p><strong>Email:</strong> dustthreadsstore@email.com</p>
    <p><strong>Phone:</strong> +267 123 4567</p>
    <p><strong>Location:</strong> Gaborone, Botswana</p>
  </div>

  <!-- CONTACT FORM -->
  <form class="contact-form" onsubmit="sendMessage(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" placeholder="Write your message..." rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="successMsg" style="color: green; display: none;">
    ✅ Message sent successfully!
  </p>

</section>

<footer>
  <p>&copy; 2024 Dust Threads</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
