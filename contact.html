<!DOCTYPE html>

<div class="app">

<header>

</header>

<!-- INTRO -->
<section class="section">
  <h2>Get in Touch 👋</h2>
  <p style="font-size:13px; color:var(--gray);">
    Have questions, feedback, or need help with your order? We’re here for you.
  </p>
</section>

<!-- CONTACT INFO -->
<section class="section">

<div class="card">
  <p>📍 Location: Gaborone, Botswana</p>
  <p>📞 Phone: +267 7123 4567</p>
  <p>📧 Email: support@dustthreads.com</p>
</div>

</section>

<!-- CONTACT FORM -->
<section class="section">

<h2>Send a Message ✉️</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Your Email">
<input id="message" placeholder="Your Message">

</section>

  <h2>Find Us 📍</h2>
