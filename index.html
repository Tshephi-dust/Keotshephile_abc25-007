<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dust Order System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .hero {
      background: url('https://images.unsplash.com/photo-1604908177522-4024b9f7b0d8') no-repeat center/cover;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero-text {
      background-color: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .hero button {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- Header -->
<header>
  <h1>Dust Pedros 🔥</h1>
  <p>Flame-Grilled Chicken, Bold Flavour</p>
</header>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="cart.html">Cart</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-text">
    <h1>Feel the Heat 🔥</h1>
    <p>Flame-grilled perfection made just for you.</p>
    <a href="menu.html">
      <button class="btn">Order Now</button>
    </a>
  </div>
</section>

<!-- Popular Items -->
<section class="section">
  <h2>Popular Meals</h2>

  <div class="items">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964092-4316c288032e" alt="Chicken Burger">
      <h3>Grilled Chicken Burger</h3>
      <p>P50</p>
      <button class="btn" onclick="addToCart('Grilled Chicken Burger', 50)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="Half Chicken">
      <h3>Half Flame Chicken</h3>
      <p>P70</p>
      <button class="btn" onclick="addToCart('Half Flame Chicken', 70)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5" alt="Chips">
      <h3>Chips</h3>
      <p>P30</p>
      <button class="btn" onclick="addToCart('Chips', 30)">Add to Cart</button>
    </div>
  </div>
</section>

<!-- Special Deals -->
<section class="section">
  <h2>Hot Deals 🔥</h2>
  <p>Get more flavour for less with our combo meals.</p>
  <a href="menu.html">
    <button class="btn">View Deals</button>
  </a>
</section>
  
<!-- JavaScript -->
<script src="js/script.js"></script>

</body>
</html>
